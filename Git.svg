<svg width="1441" height="302" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Star field -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d0221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>

    <!-- Nebula glow left -->
    <radialGradient id="nebula1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#7b2fff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>

    <!-- Nebula glow right -->
    <radialGradient id="nebula2" cx="80%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>

    <!-- Nebula glow center -->
    <radialGradient id="nebula3" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#c8a2ff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>

    <!-- Meteor trail gradient -->
    <linearGradient id="trail1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a2ff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#c8a2ff;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="trail2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="trail3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0.6" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1441" height="302" fill="url(#bgGrad)"/>

  <!-- Nebula overlays -->
  <rect width="1441" height="302" fill="url(#nebula1)"/>
  <rect width="1441" height="302" fill="url(#nebula2)"/>
  <rect width="1441" height="302" fill="url(#nebula3)"/>

  <!-- Stars - tiny white dots scattered -->
  <circle cx="45" cy="23" r="1" fill="white" opacity="0.9"/>
  <circle cx="120" cy="67" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="203" cy="12" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="289" cy="89" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="334" cy="34" r="1" fill="white" opacity="0.9"/>
  <circle cx="412" cy="78" r="0.8" fill="#c8a2ff" opacity="0.8"/>
  <circle cx="467" cy="19" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="523" cy="95" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="589" cy="41" r="1.3" fill="#00D9FF" opacity="0.6"/>
  <circle cx="634" cy="72" r="0.7" fill="white" opacity="0.9"/>
  <circle cx="712" cy="28" r="1" fill="white" opacity="0.7"/>
  <circle cx="778" cy="83" r="0.8" fill="#c8a2ff" opacity="0.7"/>
  <circle cx="845" cy="15" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="901" cy="61" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="967" cy="44" r="1" fill="#00D9FF" opacity="0.5"/>
  <circle cx="1034" cy="88" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="1089" cy="22" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="1156" cy="71" r="0.7" fill="#c8a2ff" opacity="0.8"/>
  <circle cx="1223" cy="35" r="1" fill="white" opacity="0.8"/>
  <circle cx="1289" cy="81" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="1367" cy="18" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="1412" cy="59" r="0.8" fill="#00D9FF" opacity="0.7"/>
  <!-- More stars lower half -->
  <circle cx="78" cy="198" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="156" cy="234" r="1.1" fill="#c8a2ff" opacity="0.6"/>
  <circle cx="245" cy="212" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="378" cy="267" r="1" fill="white" opacity="0.7"/>
  <circle cx="445" cy="189" r="0.7" fill="white" opacity="0.9"/>
  <circle cx="534" cy="248" r="1.2" fill="#00D9FF" opacity="0.5"/>
  <circle cx="623" cy="201" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="756" cy="278" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="834" cy="213" r="1" fill="#c8a2ff" opacity="0.7"/>
  <circle cx="923" cy="256" r="0.7" fill="white" opacity="0.9"/>
  <circle cx="1012" cy="194" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="1134" cy="239" r="0.9" fill="#00D9FF" opacity="0.6"/>
  <circle cx="1267" cy="218" r="1" fill="white" opacity="0.8"/>
  <circle cx="1389" cy="271" r="0.8" fill="white" opacity="0.7"/>

  <!-- Meteor 1 - purple, moving right -->
  <g>
    <line x1="80" y1="60" x2="200" y2="60" stroke="url(#trail1)" stroke-width="2" opacity="0.7"/>
    <circle cx="200" cy="60" r="3" fill="#c8a2ff" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="translate" from="-300 0" to="1800 0" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Meteor 2 - cyan, moving right faster -->
  <g>
    <line x1="0" y1="0" x2="150" y2="0" stroke="url(#trail2)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="150" cy="0" r="2.5" fill="#00D9FF" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="translate" from="-200 180" to="1800 180" dur="3s" begin="1s" repeatCount="indefinite"/>
  </g>

  <!-- Meteor 3 - red, diagonal -->
  <g transform="rotate(-15 720 151)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="url(#trail3)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="120" cy="0" r="2" fill="#ff4444" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="translate" from="-400 0" to="2000 0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </g>

  <!-- Meteor 4 - purple small -->
  <g>
    <line x1="0" y1="0" x2="80" y2="0" stroke="url(#trail1)" stroke-width="1" opacity="0.5"/>
    <circle cx="80" cy="0" r="1.5" fill="#c8a2ff" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="translate" from="-100 240" to="1800 240" dur="3.5s" begin="2s" repeatCount="indefinite"/>
  </g>

  <!-- Meteor 5 - cyan large -->
  <g>
    <line x1="0" y1="0" x2="200" y2="0" stroke="url(#trail2)" stroke-width="2" opacity="0.4"/>
    <circle cx="200" cy="0" r="3" fill="#00D9FF" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="translate" from="-300 120" to="1900 120" dur="6s" begin="3s" repeatCount="indefinite"/>
  </g>

  <!-- Glowing planet top left -->
  <circle cx="120" cy="80" r="28" fill="#1a0533" opacity="0.9"/>
  <circle cx="120" cy="80" r="28" fill="none" stroke="#7b2fff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="120" cy="80" r="22" fill="#0d0221" opacity="0.8"/>
  <ellipse cx="120" cy="80" rx="45" ry="8" fill="none" stroke="#7b2fff" stroke-width="1" opacity="0.4" transform="rotate(-20 120 80)"/>
  <circle cx="120" cy="80" r="28" fill="#7b2fff" opacity="0.05" filter="url(#softglow)"/>

  <!-- Small planet top right -->
  <circle cx="1320" cy="70" r="18" fill="#0d1b4b" opacity="0.9"/>
  <circle cx="1320" cy="70" r="18" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
  <circle cx="1320" cy="70" r="18" fill="#00D9FF" opacity="0.04" filter="url(#softglow)"/>

  <!-- Tiny star cluster -->
  <circle cx="1100" cy="40" r="1.5" fill="white" opacity="0.9" filter="url(#glow)"/>
  <circle cx="1108" cy="35" r="1" fill="white" opacity="0.7"/>
  <circle cx="1095" cy="47" r="0.8" fill="#c8a2ff" opacity="0.8"/>
  <circle cx="1113" cy="44" r="1.2" fill="white" opacity="0.6"/>

  <!-- Main title -->
  <text x="720" y="130" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#c8a2ff" text-anchor="middle" filter="url(#glow)">Rohith Kandula</text>

  <!-- Subtitle -->
  <text x="720" y="175" font-family="Georgia, serif" font-size="20" fill="#00D9FF" text-anchor="middle" opacity="0.9">I don't just fine-tune models -- I ship them.</text>

  <!-- Bottom tagline -->
  <text x="720" y="225" font-family="monospace" font-size="13" fill="#c8a2ff" text-anchor="middle" opacity="0.6">LLM  ·  RAG  ·  LangGraph  ·  PyTorch  ·  GCP  ·  AWS  ·  Agentic AI</text>

  <!-- Horizontal glowing line under title -->
  <line x1="400" y1="190" x2="1040" y2="190" stroke="#7b2fff" stroke-width="0.5" opacity="0.4"/>

</svg>
